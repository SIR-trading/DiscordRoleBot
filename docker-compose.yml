services:
  bot:
    build:
      context: .
      dockerfile: apps/bot/Dockerfile
    env_file: .env
    volumes:
      - ./data:/data
    restart: unless-stopped
    networks: [sir]

  verify-web:
    build:
      context: .
      dockerfile: apps/verify-web/Dockerfile
      args:
        NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID: ${NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID}
    env_file: .env
    environment:
      DB_PATH: /data/sir.db
    volumes:
      - ./data:/data
    expose:
      - "3000"
    restart: unless-stopped
    networks: [sir]

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped
    depends_on: [verify-web]
    networks: [sir]

networks:
  sir:

volumes:
  caddy_data:
  caddy_config:
